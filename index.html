<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldSense | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-blue-900">FieldSense 🌍</h1>
            <p class="text-gray-600">Monitoreo IoT en tiempo real</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-red-500">
                <h3 class="text-lg font-semibold text-gray-700">Última Temperatura</h3>
                <p id="temp-actual" class="text-4xl font-bold text-red-500 mt-2">-- °C</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500">
                <h3 class="text-lg font-semibold text-gray-700">Última Humedad</h3>
                <p id="hum-actual" class="text-4xl font-bold text-blue-500 mt-2">-- %</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-md">
            <h2 class="text-xl font-bold mb-4">Historial de Temperatura y Humedad</h2>
            <canvas id="miGrafica" height="100"></canvas>
        </div>
    </div>

    <script>
        // 1. Configuración de la gráfica (Vacía al inicio)
        const ctx = document.getElementById('miGrafica').getContext('2d');
        const chartFieldSense = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Aquí irán las horas
                datasets: [
                    {
                        label: 'Temperatura (°C)',
                        borderColor: 'rgb(239, 68, 68)', // Rojo
                        data: [], // Aquí irán los datos
                        tension: 0.3
                    },
                    {
                        label: 'Humedad (%)',
                        borderColor: 'rgb(59, 130, 246)', // Azul
                        data: [], 
                        tension: 0.3
                    }
                ]
            },
            options: { responsive: true }
        });

        // 2. Función para ir al servidor y traer los datos
        async function obtenerDatos() {
            try {
                // Hacemos la petición a tu API de Python
                const respuesta = await fetch('http://127.0.0.1:5000/api/lecturas');
                const datos = await respuesta.json();

                if (datos.length > 0) {
                    // Extraemos las listas de datos usando un mapeo rápido
                    const horas = datos.map(d => d.hora);
                    const temperaturas = datos.map(d => d.temperatura);
                    const humedades = datos.map(d => d.humedad);

                    // Actualizar las tarjetas HTML con el último dato (el más reciente)
                    const ultimoDato = datos[datos.length - 1];
                    document.getElementById('temp-actual').innerText = ultimoDato.temperatura + ' °C';
                    document.getElementById('hum-actual').innerText = ultimoDato.humedad + ' %';

                    // Inyectar datos a la gráfica
                    chartFieldSense.data.labels = horas;
                    chartFieldSense.data.datasets[0].data = temperaturas;
                    chartFieldSense.data.datasets[1].data = humedades;
                    chartFieldSense.update(); // Dibuja los cambios
                }
            } catch (error) {
                console.error("Error conectando con el servidor API:", error);
            }
        }

        // 3. Ejecutar la función inmediatamente al cargar la página
        obtenerDatos();
        
        // 4. (Opcional) Hacer que se actualice sola cada 5 segundos
        setInterval(obtenerDatos, 5000); 
    </script>
</body>
</html>
